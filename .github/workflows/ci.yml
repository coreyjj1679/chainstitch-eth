name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, typecheck, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Expect-block unit tests
        run: npm run test:expect

      - name: Unit-aware helpers
        run: npm run test:units

      - name: Handoff brief unit tests
        run: npm run test:handoff

      - name: Authorization test suite (roles & workspace isolation)
        run: npm run test:authz

      - name: Team-mode end-to-end test (SIWE login, invites, roles)
        run: npm run test:team

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  engine-smoke:
    name: Execution engine smoke test (anvil)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Foundry (anvil)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Run engine tests against a local anvil node
        run: |
          anvil --silent &
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8545 >/dev/null; then break; fi
            sleep 0.5
          done
          npm run smoke
          npm run test:run-notebook
          npm run test:cli-runner
