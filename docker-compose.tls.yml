# HTTPS overlay: Caddy terminates TLS in front of the app with an
# auto-provisioned Let's Encrypt certificate. Point your domain's DNS at
# this box, set APP_DOMAIN in .env (plus the team-mode variables), then:
#
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d --build
#
# Requires Docker Compose v2.24+ (for the `!reset` that unpublishes :3000 —
# the app stays reachable only through Caddy).
services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN in .env (e.g. notebook.example.com)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - chainstitch
    restart: unless-stopped

  chainstitch:
    ports: !reset []

volumes:
  caddy_data:
  caddy_config:
