# Run a pre-built image instead of building on this machine — for small
# hosts (≤ 1 GB RAM) where `npm ci` / `next build` can't complete.
#
# Default: the image CI publishes on every push to main (see
# .github/workflows/docker.yml). On the VPS:
#
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml \
#     -f docker-compose.image.yml pull chainstitch
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml \
#     -f docker-compose.image.yml up -d --no-build
#
# Or ship one yourself and set CHAINSTITCH_IMAGE=chainstitch:latest in .env:
#   docker buildx build --platform linux/amd64 -t chainstitch:latest --load .
#   docker save chainstitch:latest | gzip | ssh you@vps 'gunzip | docker load'
services:
  chainstitch:
    image: ${CHAINSTITCH_IMAGE:-ghcr.io/coreyjj1679/chainstitch-eth:latest}
