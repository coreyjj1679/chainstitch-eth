# Self-hosted Chainstitch. See README → Self-hosting.
#
#   Local mode (single user, no login):   docker compose up -d
#   Team mode (SIWE login + invites):     copy .env.example to .env, set
#                                         APP_MODE=team and the three variables
#                                         under it, then docker compose up -d.
services:
  chainstitch:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Everything lives in one SQLite database inside this directory.
      - ./data:/app/data
    environment:
      # Values interpolate from a .env file next to this compose file
      # (see .env.example). Without one you get local mode.
      APP_MODE: ${APP_MODE:-local}
      OWNER_WALLETS: ${OWNER_WALLETS:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
    restart: unless-stopped
